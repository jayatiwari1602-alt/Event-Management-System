<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventPro Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="login.css">

</head>
<body>

<div class="login-box">

    <h1 class="login-title">EventPro Login</h1>

    <form id="loginForm">

        <input type="email" id="email" class="form-control mb-3" placeholder="📧 Enter Your Email" required>

        <input type="password" id="password" class="form-control mb-3" placeholder="🔒 Enter Your Password" required>

        <button class="btn login-btn">Login</button>

    </form>

    <p class="text-center mt-3">
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

    <p class="text-center mt-2">
        <a href="Landing.html" class="text-secondary text-decoration-none">← Back to Home</a>
    </p>

</div>

<script src="common.js"></script>
<script src="login.js"></script>

</body>
</html>
