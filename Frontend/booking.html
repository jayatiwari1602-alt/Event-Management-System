<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Event | EventPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="booking.css">

</head>
<body>

<div class="booking-box">

<h1>Book Your Event</h1>

<form id="bookingForm">

<label>Full Name</label>
<input type="text" class="form-control mb-3" placeholder="Enter Full Name">

<label>Email Address</label>
<input type="email" class="form-control mb-3" placeholder="Enter Email">

<label>Mobile Number</label>
<input type="tel" class="form-control mb-3" placeholder="Enter Mobile Number">

<label>Number of Tickets</label>
<input type="number" class="form-control mb-3" placeholder="Enter Tickets">

<label>Payment Method</label>

<select class="form-control mb-4">
<option>Select Payment</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Cash</option>
</select>

<button class="btn booking-btn">Confirm Booking</button>

</form>

<p class="text-center mt-3">
<a href="events.html">← Back to Events</a>
</p>

</div>

<script src="booking.js"></script>

</body>
</html>
