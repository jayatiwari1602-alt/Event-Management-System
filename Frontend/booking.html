<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Event | EventPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="booking.css">

</head>
<body>

<div class="booking-box">

<h1 id="bookingHeading">Book Event</h1>
<p class="text-center text-secondary mb-4" id="bookingEventTitle">Loading event details...</p>

<form id="bookingForm">

<label>Full Name</label>
<input type="text" id="bookingName" class="form-control mb-3" placeholder="Enter Full Name" required>

<label>Email Address</label>
<input type="email" id="bookingEmail" class="form-control mb-3" placeholder="Enter Email" required>

<label>Mobile Number</label>
<input type="tel" id="bookingPhone" class="form-control mb-3" placeholder="Enter Mobile Number">

<label>Number of Tickets</label>
<input type="number" id="bookingTickets" class="form-control mb-3" placeholder="Enter Tickets" min="1" max="10" value="1" required>

<label>Payment Method</label>

<select id="bookingPayment" class="form-control mb-4" required>
<option value="">Select Payment</option>
<option value="UPI">UPI</option>
<option value="Credit Card">Credit Card</option>
<option value="Debit Card">Debit Card</option>
<option value="Cash">Cash</option>
</select>

<button class="btn booking-btn" type="submit" id="confirmBtn" disabled>Confirm Booking</button>

</form>

<p class="text-center mt-3">
<a href="events.html">← Back to Events</a>
</p>

</div>

<script src="common.js"></script>
<script src="booking.js"></script>

</body>
</html>
