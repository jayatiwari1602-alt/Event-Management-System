<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPro Register</title>

    <link rel="stylesheet" href="register.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="register-box">

    <h1>EventPro Register</h1>

    <form id="registerForm">

        <input type="text" id="name" class="form-control mb-3" placeholder="👤 Enter Your Full Name" required>

        <input type="email" id="email" class="form-control mb-3" placeholder="📧 Enter Your Email Address" required>

        <input type="password" id="password" class="form-control mb-3" placeholder="🔒 Create Strong Password" required>

        <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="✅ Confirm Your Password" required>

        <button class="btn btn-warning w-100 mt-3">Register</button>

    </form>

    <p class="mt-3 text-center">
        Already have an account?
        <a href="login.html">Login</a>
    </p>

    <p class="text-center mt-2">
        <a href="Landing.html" class="text-secondary text-decoration-none">← Back to Home</a>
    </p>

</div>

<script src="common.js"></script>
<script src="register.js"></script>

</body>
</html>
