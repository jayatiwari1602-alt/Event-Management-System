<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPro Register</title>

    <link rel="stylesheet" href="register.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="register-box">

    <h1>EventPro Register</h1>

    <form id="registerForm">

        <input type="text" class="form-control mb-3" placeholder="👤 Enter Your Full Name">

<input type="email" class="form-control mb-3" placeholder="📧 Enter Your Email Address">

<input type="password" class="form-control mb-3" placeholder="🔒 Create Strong Password">

<input type="password" class="form-control mb-3" placeholder="✅ Confirm Your Password">

<button class="btn btn-warning w-100 mt-3">Register</button>

    </form>

    <p class="mt-3 text-center">
        Already have an account?
        <a href="login.html">Login</a>
    </p>

</div>

<script src="register.js"></script>

</body>
</html>
